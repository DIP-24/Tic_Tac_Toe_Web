<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Header">
        <h1>Tic-Tac-Toe</h1>
    </div>
    <div class="container">
        <div class="game">             
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button> 
            <button class="box"></button>
        </div>
    </div>
    <div class="score hide" role="alertdialog" aria-modal="true" aria-labelledby="winner-text">
        <div class="score-card">
            <p class="msg" id="winner-text">Winner</p>
            <button class="btn" id="newGame">Play Again</button>
        </div>
    </div>
    <div class="footer">
        <button class="btn" id="reset">Reset Board</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
